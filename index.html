<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
<meta name="theme-color" content="#0A0A0F" />
<title>SPIDER-MAN | Estreno 31 de Julio</title>

<!-- Fuentes estilo cómic -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
/* ============================================
   RESET & BASE
============================================ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --spidey-red: #E62429;
  --spidey-red-bright: #FF3B40;
  --spidey-blue: #1B3A8C;
  --spidey-blue-bright: #2B4FD1;
  --cinema-black: #0A0A0F;
  --cinema-dark: #14141C;
  --gold-accent: #FFD700;
  --neon-pink: #FF1B6B;
  --neon-blue: #00D4FF;
  --text-primary: #FFFFFF;
  --text-secondary: rgba(255, 255, 255, 0.75);
}

html, body {
  overflow-x: hidden;
  background: var(--cinema-black);
  color: var(--text-primary);
  font-family: 'Inter', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ============================================
   HERO CONTAINER
============================================ */
.hero {
  position: relative;
  min-height: 100dvh;
  width: 100%;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(230, 36, 41, 0.25) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 20%, rgba(27, 58, 140, 0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 100%, rgba(230, 36, 41, 0.15) 0%, transparent 60%),
    linear-gradient(180deg, #05050A 0%, #0A0A14 50%, #0F0812 100%);
  perspective: 1200px;
  isolation: isolate;
}

/* ============================================
   HALFTONE / CÓMIC TEXTURE OVERLAY
============================================ */
.halftone-overlay {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);
  background-size: 6px 6px;
  pointer-events: none;
  z-index: 2;
  mix-blend-mode: overlay;
}

/* ============================================
   FILM GRAIN
============================================ */
.film-grain {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 3;
  opacity: 0.15;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.8'/></svg>");
  mix-blend-mode: overlay;
  animation: grainShift 0.8s steps(4) infinite;
}

@keyframes grainShift {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(-2%, 1%); }
  50% { transform: translate(1%, -2%); }
  75% { transform: translate(-1%, 2%); }
}

/* ============================================
   PROJECTOR BEAM (HAZ DE LUZ)
============================================ */
.projector-beam {
  position: absolute;
  top: -10%;
  left: 50%;
  width: 140%;
  height: 80%;
  transform: translateX(-50%) rotate(0deg);
  background:
    conic-gradient(from 270deg at 50% 0%,
      transparent 0deg,
      rgba(255, 255, 255, 0.03) 15deg,
      rgba(255, 255, 255, 0.06) 30deg,
      rgba(255, 255, 255, 0.03) 45deg,
      transparent 60deg);
  filter: blur(20px);
  pointer-events: none;
  z-index: 1;
  animation: beamFlicker 4s ease-in-out infinite;
}

@keyframes beamFlicker {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 0.9; }
}

/* ============================================
   CINEMA AMBIENT LIGHTS (LED ROJO/AZUL)
============================================ */
.ambient-light {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 1;
  animation: ambientPulse 6s ease-in-out infinite;
}

.ambient-light.red {
  top: 15%;
  left: -10%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, var(--spidey-red) 0%, transparent 70%);
  opacity: 0.4;
}

.ambient-light.blue {
  top: 30%;
  right: -15%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, var(--spidey-blue-bright) 0%, transparent 70%);
  opacity: 0.35;
  animation-delay: -3s;
}

.ambient-light.bottom {
  bottom: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 400px;
  background: radial-gradient(ellipse, var(--neon-pink) 0%, transparent 70%);
  opacity: 0.25;
}

@keyframes ambientPulse {
  0%, 100% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(1.1); opacity: 0.6; }
}

.ambient-light.bottom {
  animation: ambientPulseBottom 6s ease-in-out infinite;
}
@keyframes ambientPulseBottom {
  0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.25; }
  50% { transform: translateX(-50%) scale(1.15); opacity: 0.4; }
}

/* ============================================
   FLOATING DUST PARTICLES (POLVO EN PROYECTOR)
============================================ */
.dust-particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
  overflow: hidden;
}

.dust {
  position: absolute;
  width: 2px;
  height: 2px;
  background: rgba(255, 255, 255, 0.6);
  border-radius: 50%;
  box-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
  animation: dustFloat linear infinite;
}

@keyframes dustFloat {
  0% { transform: translate(0, 100vh) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translate(var(--dx, 50px), -20vh) scale(1); opacity: 0; }
}

/* ============================================
   SPIDER-MAN 3D PARALLAX SCENE
============================================ */
.spider-scene {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(90vw, 500px);
  height: min(110vw, 600px);
  max-height: 70vh;
  z-index: 5;
  transform-style: preserve-3d;
  pointer-events: none;
}

.spider-layer {
  position: absolute;
  inset: 0;
  transform-style: preserve-3d;
  transition: transform 0.15s ease-out;
  will-change: transform;
}

/* Sombra de fondo */
.spider-shadow {
  position: absolute;
  bottom: 5%;
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  height: 15%;
  background: radial-gradient(ellipse, rgba(0,0,0,0.8) 0%, transparent 70%);
  filter: blur(15px);
  z-index: 1;
}

/* Capa trasera - Silueta con glow */
.spider-back {
  filter: drop-shadow(0 0 30px rgba(230, 36, 41, 0.6))
          drop-shadow(0 0 60px rgba(27, 58, 140, 0.4));
  transform: translateZ(-30px);
}

/* Capa media - Cuerpo principal */
.spider-mid {
  transform: translateZ(0px);
}

/* Capa frontal - Detalles y ojos (más pop-out) */
.spider-front {
  transform: translateZ(40px);
}

/* Capa ultra-frontal - Telarañas destacadas */
.spider-top {
  transform: translateZ(80px);
}

/* ============================================
   CINEMA SEATS (SILUETAS DE ASIENTOS)
============================================ */
.cinema-seats {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  z-index: 6;
  pointer-events: none;
}

.cinema-seats svg {
  width: 100%;
  height: 100%;
  display: block;
}

/* ============================================
   WEB LINES (TELARAÑAS DECORATIVAS)
============================================ */
.web-corner {
  position: absolute;
  width: 180px;
  height: 180px;
  pointer-events: none;
  z-index: 4;
  opacity: 0.7;
}

.web-corner.top-left {
  top: 0;
  left: 0;
}

.web-corner.top-right {
  top: 0;
  right: 0;
  transform: scaleX(-1);
}

/* ============================================
   CONTENT LAYER
============================================ */
.hero-content {
  position: relative;
  z-index: 10;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: calc(env(safe-area-inset-top, 0px) + 20px) 20px calc(env(safe-area-inset-bottom, 0px) + 24px);
  pointer-events: none;
}

.hero-content > * {
  pointer-events: auto;
}

/* ============================================
   TOP BADGE
============================================ */
.top-badge {
  display: flex;
  justify-content: center;
  animation: slideDown 0.8s ease-out;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: rgba(230, 36, 41, 0.15);
  border: 1px solid rgba(230, 36, 41, 0.4);
  border-radius: 100px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-primary);
  box-shadow: 0 0 20px rgba(230, 36, 41, 0.3);
}

.badge-dot {
  width: 6px;
  height: 6px;
  background: var(--spidey-red-bright);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--spidey-red-bright);
  animation: dotPulse 1.5s ease-in-out infinite;
}

@keyframes dotPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============================================
   MAIN TITLE (ESTILO CÓMIC 3D)
============================================ */
.title-block {
  text-align: center;
  margin-top: auto;
  margin-bottom: 10px;
  animation: titlePop 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
}

.subtitle {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(14px, 3.5vw, 18px);
  letter-spacing: 6px;
  color: var(--gold-accent);
  text-transform: uppercase;
  margin-bottom: 8px;
  text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
}

.main-title {
  font-family: 'Bangers', cursive;
  font-size: clamp(48px, 14vw, 96px);
  line-height: 0.9;
  letter-spacing: 2px;
  color: var(--spidey-red);
  text-transform: uppercase;
  position: relative;
  display: inline-block;
  /* Sombras 3D estilo cómic */
  text-shadow:
    2px 2px 0 #000,
    4px 4px 0 #000,
    6px 6px 0 var(--spidey-blue),
    8px 8px 0 var(--spidey-blue),
    10px 10px 0 #000,
    12px 12px 20px rgba(0,0,0,0.8),
    0 0 40px rgba(230, 36, 41, 0.5);
  transform: rotate(-2deg);
  -webkit-text-stroke: 2px #000;
  paint-order: stroke fill;
}

.main-title .spidey {
  color: var(--spidey-blue-bright);
  text-shadow:
    2px 2px 0 #000,
    4px 4px 0 #000,
    6px 6px 0 var(--spidey-red),
    8px 8px 0 var(--spidey-red),
    10px 10px 0 #000,
    12px 12px 20px rgba(0,0,0,0.8),
    0 0 40px rgba(43, 79, 209, 0.6);
}

.tagline {
  font-family: 'Inter', sans-serif;
  font-size: clamp(13px, 3vw, 16px);
  font-weight: 600;
  color: var(--text-secondary);
  margin-top: 16px;
  letter-spacing: 1px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.8);
}

@keyframes titlePop {
  from { opacity: 0; transform: scale(0.7) rotate(-5deg); }
  to { opacity: 1; transform: scale(1) rotate(-2deg); }
}

/* ============================================
   COUNTDOWN (ESTILO CINE DIGITAL)
============================================ */
.countdown-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  animation: fadeUp 1s ease-out 0.5s both;
}

.countdown-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 4px;
  color: var(--text-secondary);
  text-transform: uppercase;
}

.countdown {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}

.countdown-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 64px;
  padding: 10px 8px;
  background: linear-gradient(180deg, rgba(20,20,28,0.9) 0%, rgba(10,10,15,0.95) 100%);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.1),
    0 8px 24px rgba(0,0,0,0.5),
    0 0 20px rgba(230, 36, 41, 0.15);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.countdown-item::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--spidey-red-bright), transparent);
  opacity: 0.6;
}

.countdown-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(28px, 7vw, 40px);
  line-height: 1;
  color: var(--text-primary);
  font-weight: 400;
  letter-spacing: 1px;
  text-shadow:
    0 0 10px rgba(230, 36, 41, 0.6),
    0 0 20px rgba(230, 36, 41, 0.3);
  transition: transform 0.3s ease;
}

.countdown-number.flip {
  animation: numberFlip 0.6s ease;
}

@keyframes numberFlip {
  0% { transform: translateY(-10px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

.countdown-unit {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-secondary);
  text-transform: uppercase;
  margin-top: 4px;
  font-weight: 600;
}

.countdown-separator {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(28px, 7vw, 40px);
  color: var(--spidey-red);
  align-self: flex-start;
  margin-top: 10px;
  animation: separatorBlink 1s ease-in-out infinite;
}

@keyframes separatorBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ============================================
   CTA BUTTON (NEON + TELARAÑA)
============================================ */
.cta-wrapper {
  display: flex;
  justify-content: center;
  width: 100%;
  animation: fadeUp 1s ease-out 0.7s both;
}

.cta-button {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  max-width: 380px;
  min-height: 60px;
  padding: 16px 28px;
  font-family: 'Bangers', cursive;
  font-size: clamp(18px, 4.5vw, 22px);
  letter-spacing: 2px;
  color: white;
  text-transform: uppercase;
  text-decoration: none;
  background:
    linear-gradient(135deg, var(--spidey-red) 0%, var(--spidey-red-bright) 50%, var(--spidey-red) 100%);
  background-size: 200% 200%;
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 100px;
  cursor: pointer;
  overflow: hidden;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow:
    0 0 0 0 rgba(230, 36, 41, 0.7),
    0 10px 30px rgba(230, 36, 41, 0.4),
    inset 0 1px 0 rgba(255,255,255,0.3),
    inset 0 -2px 0 rgba(0,0,0,0.2);
  animation: ctaPulse 2.5s ease-in-out infinite, bgShift 4s ease-in-out infinite;
  text-shadow: 0 2px 4px rgba(0,0,0,0.4);
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

@keyframes ctaPulse {
  0%, 100% {
    box-shadow:
      0 0 0 0 rgba(230, 36, 41, 0.7),
      0 10px 30px rgba(230, 36, 41, 0.4),
      inset 0 1px 0 rgba(255,255,255,0.3),
      inset 0 -2px 0 rgba(0,0,0,0.2);
  }
  50% {
    box-shadow:
      0 0 0 15px rgba(230, 36, 41, 0),
      0 10px 40px rgba(230, 36, 41, 0.6),
      inset 0 1px 0 rgba(255,255,255,0.3),
      inset 0 -2px 0 rgba(0,0,0,0.2);
  }
}

@keyframes bgShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.cta-button::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(
    45deg,
    transparent 30%,
    rgba(255,255,255,0.3) 50%,
    transparent 70%
  );
  transform: translateX(-100%);
  transition: transform 0.6s;
}

.cta-button:hover::before,
.cta-button:focus-visible::before {
  transform: translateX(100%);
}

.cta-button:hover,
.cta-button:focus-visible {
  transform: translateY(-3px) scale(1.02);
  box-shadow:
    0 0 0 4px rgba(230, 36, 41, 0.3),
    0 15px 40px rgba(230, 36, 41, 0.6),
    0 0 60px rgba(230, 36, 41, 0.4),
    inset 0 1px 0 rgba(255,255,255,0.4);
}

.cta-button:active {
  transform: translateY(0) scale(0.98);
}

.cta-icon {
  width: 22px;
  height: 22px;
  filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
}

/* ============================================
   ANIMATIONS HELPERS
============================================ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============================================
   RESPONSIVE - TABLET Y DESKTOP
============================================ */
@media (min-width: 768px) {
  .hero-content {
    padding: 40px 60px;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }

  .top-badge {
    position: absolute;
    top: 40px;
    left: 60px;
    justify-content: flex-start;
  }

  .title-block {
    flex: 1;
    text-align: left;
    margin: 0;
    padding-right: 40px;
    z-index: 11;
  }

  .spider-scene {
    position: absolute;
    right: 5%;
    top: 50%;
    transform: translateY(-50%);
    width: 45vw;
    max-width: 600px;
  }

  .countdown-wrapper {
    position: absolute;
    bottom: 40px;
    left: 60px;
    flex-direction: row;
    align-items: center;
    gap: 20px;
    margin: 0;
  }

  .cta-wrapper {
    position: absolute;
    bottom: 40px;
    right: 60px;
    width: auto;
  }

  .cta-button {
    max-width: 320px;
  }

  .cinema-seats {
    height: 150px;
  }

  .web-corner {
    width: 250px;
    height: 250px;
  }
}

@media (min-width: 1200px) {
  .main-title {
    font-size: 110px;
  }

  .spider-scene {
    width: 550px;
  }
}

/* ============================================
   REDUCED MOTION
============================================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* Focus visible accesible */
.cta-button:focus-visible {
  outline: 3px solid var(--gold-accent);
  outline-offset: 4px;
}
</style>
</head>
<body>

<section class="hero" id="hero">

  <!-- Efectos de ambiente -->
  <div class="ambient-light red"></div>
  <div class="ambient-light blue"></div>
  <div class="ambient-light bottom"></div>
  <div class="projector-beam"></div>
  <div class="halftone-overlay"></div>
  <div class="film-grain"></div>

  <!-- Partículas de polvo (generadas por JS) -->
  <div class="dust-particles" id="dustParticles"></div>

  <!-- Telarañas en esquinas -->
  <svg class="web-corner top-left" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <g stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none">
      <path d="M0,0 L200,200"/>
      <path d="M0,0 L150,200"/>
      <path d="M0,0 L200,150"/>
      <path d="M0,0 L100,200"/>
      <path d="M0,0 L200,100"/>
      <path d="M0,0 L50,200"/>
      <path d="M0,0 L200,50"/>
      <path d="M0,0 Q100,50 200,200" stroke-dasharray="2,3"/>
      <path d="M0,0 Q50,100 200,200" stroke-dasharray="2,3"/>
      <path d="M30,30 Q80,80 150,150" stroke-dasharray="1,2" opacity="0.6"/>
      <path d="M60,60 Q110,110 180,180" stroke-dasharray="1,2" opacity="0.6"/>
    </g>
  </svg>
  <svg class="web-corner top-right" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <g stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none">
      <path d="M0,0 L200,200"/>
      <path d="M0,0 L150,200"/>
      <path d="M0,0 L200,150"/>
      <path d="M0,0 L100,200"/>
      <path d="M0,0 L200,100"/>
      <path d="M0,0 L50,200"/>
      <path d="M0,0 L200,50"/>
      <path d="M0,0 Q100,50 200,200" stroke-dasharray="2,3"/>
      <path d="M0,0 Q50,100 200,200" stroke-dasharray="2,3"/>
    </g>
  </svg>

  <!-- SPIDER-MAN 3D PARALLAX -->
  <div class="spider-scene" id="spiderScene">

    <!-- Sombra en el suelo -->
    <div class="spider-shadow"></div>

    <!-- CAPA 1: Fondo con glow -->
    <svg class="spider-layer spider-back" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">

<script>
/* ============================================
   COUNTDOWN REGRESIVO - 31 JULIO 2026
============================================ */
(function initCountdown() {
  const targetDate = new Date('2026-07-31T19:00:00').getTime();
  const daysEl = document.getElementById('days');
  const hoursEl = document.getElementById('hours');
  const minutesEl = document.getElementById('minutes');
  const secondsEl = document.getElementById('seconds');

  let prevValues = { d: '', h: '', m: '', s: '' };

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function flipIfChanged(el, newVal, key) {
    if (prevValues[key] !== newVal) {
      el.textContent = newVal;
      el.classList.remove('flip');
      void el.offsetWidth; // trigger reflow
      el.classList.add('flip');
      prevValues[key] = newVal;
    }
  }

  function update() {
    const now = Date.now();
    const diff = targetDate - now;

    if (diff <= 0) {
      daysEl.textContent = '00';
      hoursEl.textContent = '00';
      minutesEl.textContent = '00';
      secondsEl.textContent = '00';
      return;
    }

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const m = Math.floor((diff / (1000 * 60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    flipIfChanged(daysEl, pad(d), 'd');
    flipIfChanged(hoursEl, pad(h), 'h');
    flipIfChanged(minutesEl, pad(m), 'm');
    flipIfChanged(secondsEl, pad(s), 's');
  }

  update();
  setInterval(update, 1000);
})();

/* ============================================
   PARALLAX 3D EN SPIDER-MAN
   - Mouse en desktop
   - DeviceOrientation en mobile
   - Touch drag fallback
============================================ */
(function initParallax() {
  const scene = document.getElementById('spiderScene');
  const layers = scene.querySelectorAll('.spider-layer');
  const depths = [-30, 0, 40, 80]; // coincide con translateZ de cada capa

  let targetX = 0, targetY = 0;
  let currentX = 0, currentY = 0;
  let useDeviceOrientation = false;

  // Desktop: mouse move
  document.addEventListener('mousemove', (e) => {
    if (useDeviceOrientation) return;
    const rect = scene.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    targetX = (e.clientX - centerX) / rect.width;
    targetY = (e.clientY - centerY) / rect.height;
    targetX = Math.max(-1, Math.min(1, targetX));
    targetY = Math.max(-1, Math.min(1, targetY));
  });

  // Mobile: Device Orientation
  if (window.DeviceOrientationEvent) {
    window.addEventListener('deviceorientation', (e) => {
      if (e.gamma !== null && e.beta !== null) {
        useDeviceOrientation = true;
        targetX = Math.max(-1, Math.min(1, e.gamma / 30));
        targetY = Math.max(-1, Math.min(1, (e.beta - 45) / 30));
      }
    }, { passive: true });
  }

  // Mobile fallback: touch drag
  let touchActive = false;
  scene.parentElement.addEventListener('touchmove', (e) => {
    if (useDeviceOrientation) return;
    const touch = e.touches[0];
    const rect = scene.getBoundingClientRect();
    targetX = ((touch.clientX - rect.left) / rect.width - 0.5) * 2;
    targetY = ((touch.clientY - rect.top) / rect.height - 0.5) * 2;
  }, { passive: true });

  // Animation loop suave
  function animate() {
    currentX += (targetX - currentX) * 0.08;
    currentY += (targetY - currentY) * 0.08;

    // Rotar la escena completa
    scene.style.transform = `translate(-50%, -50%) rotateY(${currentX * 15}deg) rotateX(${-currentY * 10}deg)`;

    // Aplicar parallax por capa
    layers.forEach((layer, i) => {
      const depth = depths[i] / 100;
      const moveX = currentX * 20 * (depth + 0.5);
      const moveY = currentY * 15 * (depth + 0.5);
      const baseZ = depths[i];
      layer.style.transform = `translateZ(${baseZ}px) translate(${moveX}px, ${moveY}px)`;
    });

    requestAnimationFrame(animate);
  }
  animate();
})();

/* ============================================
   PARTÍCULAS DE POLVO FLOTANTE
============================================ */
(function initDust() {
  const container = document.getElementById('dustParticles');
  const count = window.innerWidth < 768 ? 20 : 40;

  for (let i = 0; i < count; i++) {
    const dust = document.createElement('div');
    dust.className = 'dust';
    const size = Math.random() * 2 + 1;
    dust.style.width = size + 'px';
    dust.style.height = size + 'px';
    dust.style.left = Math.random() * 100 + '%';
    dust.style.setProperty('--dx', (Math.random() * 200 - 100) + 'px');
    dust.style.animationDuration = (Math.random() * 15 + 10) + 's';
    dust.style.animationDelay = (Math.random() * 15) + 's';
    dust.style.opacity = Math.random() * 0.6 + 0.2;
    container.appendChild(dust);
  }
})();

/* ============================================
   CTA - EFECTO RIPPLE AL TAP
============================================ */
(function initCTA() {
  const btn = document.getElementById('ctaButton');

  btn.addEventListener('click', function(e) {
    // Efecto ripple
    const ripple = document.createElement('span');
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const x = (e.clientX || rect.left + rect.width / 2) - rect.left - size / 2;
    const y = (e.clientY || rect.top + rect.height / 2) - rect.top - size / 2;

    ripple.style.cssText = `
      position: absolute;
      left: ${x}px;
      top: ${y}px;
      width: ${size}px;
      height: ${size}px;
      background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, transparent 70%);
      border-radius: 50%;
      transform: scale(0);
      pointer-events: none;
      animation: rippleEffect 0.8s ease-out forwards;
    `;
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 800);

    // Aquí iría la lógica de reserva
    console.log('🎟️ Abriendo sistema de reserva de boletos...');
  });

  // Inyectar keyframe de ripple
  const style = document.createElement('style');
  style.textContent = `
    @keyframes rippleEffect {
      to { transform: scale(2.5); opacity: 0; }
    }
  `;
  document.head.appendChild(style);
})();
</script>
